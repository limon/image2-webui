<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收藏图片</title>
  <style>
    :root, :root[data-theme="dark"] {
      --bg: #050507;
      --panel: #0f1a1d;
      --panel-2: #13282d;
      --panel-hover: #16323a;
      --border: rgba(20, 184, 166, 0.15);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #14b8a6;
      --danger: #ef4444;
    }
    :root[data-theme="light"] {
      --bg: #f0f1f4;
      --panel: #ffffff;
      --panel-2: #f3f4f6;
      --panel-hover: #f9fafb;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #14b8a6;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .layout-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }
    .layout-btn {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }
    .layout-btn.active {
      background: var(--panel-2);
      color: var(--accent);
    }
    .section-links {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .section-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
    }
    .section-link.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--panel-2);
    }
    .section-link-count {
      color: inherit;
      opacity: 0.78;
      font-size: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { background: var(--panel-hover); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .grid.masonry {
      display: block;
      column-width: 240px;
      column-gap: 14px;
    }
    .grid:not(.masonry) .card {
      aspect-ratio: 1 / 1;
    }
    .card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .grid.masonry .card {
      display: inline-block;
      width: 100%;
      margin: 0 0 14px;
      break-inside: avoid;
    }
    .media {
      position: relative;
    }
    .grid:not(.masonry) .media {
      height: 100%;
    }
    .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      cursor: pointer;
      background: var(--panel-2);
    }
    .grid:not(.masonry) .thumb {
      height: 100%;
      object-fit: cover;
      object-position: 50% 20%;
    }
    .missing-thumb {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      line-height: 1.6;
    }
    .meta {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .label {
      font-size: 12px;
      color: var(--muted);
    }
    .prompt {
      font-size: 13px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .fav {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 30px;
      height: 30px;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.44);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .fav svg {
      width: 18px;
      height: 18px;
      fill: rgba(239, 68, 68, 0.72);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
    }
    .card:hover .fav,
    .card:focus-within .fav {
      opacity: 1;
    }
    .fav:hover svg {
      fill: rgba(239, 68, 68, 0.92);
      transform: scale(1.03);
    }
    .fav:hover {
      background: rgba(0,0,0,0.62);
    }
    .empty {
      padding: 80px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: var(--panel);
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 40;
    }
    .lightbox.active { display: flex; }
    .lightbox-media {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 95vw;
      max-height: 95vh;
    }
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      border-radius: 10px;
    }
    .lightbox-caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 14px;
      border-radius: 0 0 10px 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.72) 38%, rgba(0,0,0,0.82) 100%);
      color: white;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .snapshot-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
    }
    .snapshot-overlay.active { display: flex; }
    .snapshot-card {
      width: min(1040px, 100%);
      max-height: min(88vh, 920px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .snapshot-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }
    .snapshot-close {
      min-width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }
    .snapshot-body {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 360px);
      gap: 18px;
      align-items: start;
    }
    .snapshot-main {
      background: var(--panel-2);
      border-radius: 14px;
      overflow: hidden;
      min-height: 280px;
    }
    .snapshot-main img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 72vh;
      object-fit: contain;
      cursor: zoom-in;
      background: var(--panel-2);
    }
    .snapshot-side {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
    }
    .snapshot-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .snapshot-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }
    .snapshot-prompt {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .snapshot-section-title {
      font-size: 13px;
      color: var(--muted);
    }
    .snapshot-refs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 10px;
    }
    .snapshot-ref {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .snapshot-ref button {
      appearance: none;
      border: none;
      padding: 0;
      background: transparent;
      cursor: zoom-in;
    }
    .snapshot-ref img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: 50% 20%;
      border-radius: 12px;
      background: var(--panel-2);
    }
    .snapshot-ref span {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .snapshot-actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 4px;
    }
    .snapshot-actions .btn[disabled] {
      opacity: 0.46;
      cursor: not-allowed;
      pointer-events: none;
    }
    @media (max-width: 880px) {
      .snapshot-body {
        grid-template-columns: 1fr;
      }
      .snapshot-main img {
        max-height: 56vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="section-links">
        <a class="section-link" href="/favorites" id="activeLink">
          <span>收藏中</span>
          <span class="section-link-count" id="activeCount"></span>
        </a>
        <a class="section-link" href="/favorites?view=archived" id="archivedLink">
          <span>已归档</span>
          <span class="section-link-count" id="archivedCount"></span>
        </a>
      </div>
      <div class="actions">
        <div class="layout-toggle">
          <button class="layout-btn active" id="gridLayoutBtn" type="button">网格</button>
          <button class="layout-btn" id="masonryLayoutBtn" type="button">瀑布流</button>
        </div>
        <a class="btn" href="/">返回主页</a>
      </div>
    </div>
    <div id="favoritesGrid" class="grid"></div>
  </div>
  <div class="lightbox" id="lightbox">
    <div class="lightbox-media">
      <img id="lightboxImg" alt="">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>
  <div class="snapshot-overlay" id="snapshotOverlay">
      <div class="snapshot-card">
        <div class="snapshot-head">
          <button class="snapshot-close" id="snapshotCloseBtn" type="button" aria-label="关闭">×</button>
        </div>
      <div class="snapshot-body">
        <div class="snapshot-main">
          <img id="snapshotImage" alt="">
        </div>
        <div class="snapshot-side">
          <div class="snapshot-meta" id="snapshotMeta"></div>
          <div class="snapshot-prompt" id="snapshotPrompt"></div>
          <div id="snapshotRefsWrap" hidden>
            <div class="snapshot-section-title" id="snapshotRefsLabel">关联图片</div>
            <div class="snapshot-refs" id="snapshotRefs"></div>
          </div>
          <div class="snapshot-actions">
            <button class="btn" id="snapshotDownloadBtn" type="button">下载</button>
            <button class="btn" id="snapshotReuseBtn" type="button">复用配置</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/favorites.js"></script>
</body>
</html>
